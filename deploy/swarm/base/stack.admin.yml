version: "3.9"

services:
  portainer-agent:
    image: portainer/agent:2.39.0-alpine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - portainer_agent_network
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

  portainer:
    image: portainer/portainer-ce:2.39.0-alpine
    command:
      - -H
      - tcp://tasks.portainer-agent:9001
      - --tlsskipverify
    ports:
      - target: 9443
        published: 9443
        protocol: tcp
        mode: ingress
    volumes:
      - portainer_data:/data
    networks:
      - portainer_agent_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

volumes:
  portainer_data:
    driver: local

networks:
  portainer_agent_network:
    driver: overlay
    attachable: true
