version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nebula
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD_FILE: /run/secrets/nebula_postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    secrets:
      - source: nebula_postgres_password
        target: nebula_postgres_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  public:
    driver: overlay
  app:
    driver: overlay
  data:
    driver: overlay

secrets:
  nebula_postgres_password:
    external: true
